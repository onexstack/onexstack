otel:
  # otel collector agent 后端访问地址，gRPC 协议
  #endpoint: 127.0.0.1:4327
  endpoint: 172.16.16.3:4327
  # Trace 系统中，现实的服务名
  service-name: bke-dashboard
  # OpenTelemetry 规范输出 mode：
  #   - otel: OpenTelemetry 可观测数据输出到 otel collector agent
  #   - file: OpenTelemetry 可观测数据输出到文件，通过 --otel.output-dir 参数指定输出的文件夹
  #   - console: OpenTelemetry 可观测数据输出到标准输出
  # 传统模式输出：
  #   - legacy: 传统模式输出。日志使用 slog 输出到标准输出/文件、metrics 使用 prometheus 采集，trace 默认不做任何处理
  output-mode: classic
  level: debug
  add-source: false
  slog:
    format: json # 只有 output-mod 为 legacy 时生效，
    time-format: "2006-01-02 15:04:05" # 只有 output-mod 为 legacy 时生效，
    output: stdout # 只有 output-mod 为 legacy 时生效，可选值为：stdout、、stderr、文件路径
